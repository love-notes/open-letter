<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>For You, My Dearest Love.</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        /* Color Palette Variables */
        :root {
            --buttermilk: #FFF1B5;
            --pastel-blue: #C1DBE8;
            --old-burgundy: #43302E;
            --dusty-rose: #C9A8A8;
            --cream: #FAF7F2;
            --soft-burgundy: #8B5A5A;
            --light-gold: #F5E6D3;
            --text-dark: #3A2C2A;
            --accent-pink: #E8C4D0;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Georgia', 'Garamond', serif;
            background: var(--cream);
            overflow-x: hidden;
overflow-y: auto;
        }

.page-container {
    width: 100%;
    height: 100vh;
    height: 100dvh;
    position: fixed;
    top: 0;
    left: 0;

    display: flex;
    align-items: center;
    justify-content: center;

    opacity: 0;
    transition: opacity 0.8s ease-in-out;
    pointer-events: none;
}

.page-2 {
    align-items: flex-start;
}

        .page-container.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* ===== PAGE 1: PASSWORD PAGE ===== */
        .page-1 {
            background: linear-gradient(135deg, var(--dusty-rose) 0%, var(--dusty-rose) 100%);
            overflow-y: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Star Pattern Background */
        .stars-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .star {
            position: absolute;
            width: 20px;
            height: 20px;
            fill: rgba(139, 90, 90, 0.5);
            opacity: 0.6;
            animation: twinkle 3s infinite;
        }

        .star:nth-child(odd) {
            animation-delay: 0.5s;
        }

        .star:nth-child(3n) {
            animation-delay: 1s;
        }

        .star:nth-child(5n) {
            animation-delay: 1.5s;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        /* Card */
        .password-card {
            background: var(--cream);
            border-radius: 12px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            max-width: 380px;
            width: 100%;
            position: relative;
            z-index: 10;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .divider-top {
            width: 60%;
            height: 2px;
            background: var(--soft-burgundy);
            margin: 0 auto 30px;
        }

        .lovebook-title {
            font-size: 32px;
            font-weight: 400;
            letter-spacing: 4px;
            color: var(--text-dark);
            margin-bottom: 30px;
            font-style: italic;
        }

        .hint-label {
            font-size: 14px;
            color: var(--soft-burgundy);
            font-style: italic;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .password-input-wrapper {
            margin-bottom: 10px;
        }

        .password-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid var(--pastel-blue);
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            color: var(--text-dark);
            background: rgba(255, 255, 255, 0.8);
            text-align: center;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            -webkit-appearance: none;
            appearance: none;
        }

        .password-input:focus {
            outline: none;
            border-color: var(--old-burgundy);
            box-shadow: 0 0 0 3px rgba(67, 48, 46, 0.1);
            background: rgba(255, 255, 255, 1);
        }

        .error-message {
            font-size: 13px;
            color: #C74646;
            margin-top: 8px;
            opacity: 0;
            transition: opacity 0.3s ease;
            display: none;
        }

        .error-message.show {
            display: block;
            opacity: 1;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .submit-btn {
            width: 100%;
            padding: 14px 30px;
            margin-top: 25px;
            background: linear-gradient(135deg, var(--old-burgundy), var(--soft-burgundy));
            color: var(--cream);
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(67, 48, 46, 0.2);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(67, 48, 46, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .divider-bottom {
            width: 60%;
            height: 2px;
            background: var(--soft-burgundy);
            margin: 30px auto 0;
        }

        /* ===== PAGE 2: LOVE LETTER PAGE ===== */
        .page-2 {
            background: linear-gradient(135deg, var(--old-burgundy) 0%, #5A3D3A 100%);
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .letter-container {
            background: var(--cream);
            border-radius: 12px;
            padding: 60px 50px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            animation: letterFade 0.6s ease-out;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            max-height: 700px;
            min-height: 400px;
            height: 80dvh;
        }

        @keyframes letterFade {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .letter-header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 2px solid var(--soft-burgundy);
            padding-bottom: 20px;
        }

        .letter-title {
            font-size: 28px;
            font-style: italic;
            color: var(--text-dark);
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .letter-subtitle {
            font-size: 16px;
            color: var(--soft-burgundy);
            letter-spacing: 1px;
        }

        .letter-content {
            font-family: 'Georgia', serif;
    font-weight: 500;
            font-size: 16px;
            line-height: 1.8;
            color: #2b1f1d;
            overflow-y: auto;
            padding-right: 10px;
                -webkit-overflow-scrolling: touch;
                flex: 1;
                min-height: 0;
        }

.letter-header {
    flex-shrink: 0;
}

.letter-signature {
    flex-shrink: 0;
}

.nav-buttons {
    flex-shrink: 0;
}

        .paragraph {
            margin-bottom: 30px;
            text-align: justify;
            opacity: 0;
        }

        .paragraph.visible {
            opacity: 1;
        }
        
.paragraph {
    margin-bottom: 28px;
    text-align: justify;
}
        /* Typewriter Cursor */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background-color: var(--old-burgundy);
            margin-left: 3px;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        .letter-signature {
            margin-top: 50px;
            text-align: right;
            font-style: italic;
            color: var(--soft-burgundy);
            font-size: 18px;
        }

        .signature-stamp {
            margin-top: 20px;
            font-size: 60px;
            opacity: 0.3;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 12px 30px;
            border: 2px solid var(--soft-burgundy);
            background: transparent;
            color: var(--old-burgundy);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .nav-btn:hover {
            background: var(--old-burgundy);
            color: var(--cream);
            transform: translateY(-2px);
        }

        .nav-btn.next-btn {
            background: linear-gradient(135deg, var(--old-burgundy), var(--soft-burgundy));
            color: var(--cream);
            border: none;
        }

        /* ===== PAGE 3: PHOTOBOOTH PAGE ===== */
        .page-3 {
            background: linear-gradient(135deg, var(--pastel-blue) 0%, #A8D5E8 100%);
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photobooth-container {
            max-width: 700px;
            width: 100%;
            animation: photoFade 0.8s ease-out;
        }

        @keyframes photoFade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .photobooth-title {
            text-align: center;
            font-size: 32px;
            font-weight: 400;
            letter-spacing: 2px;
            color: var(--text-dark);
            margin-bottom: 50px;
            font-style: italic;
        }

        .photos-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .photo-frame {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            
            background: var(--cream);
        }

        .photo-frame:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .photo-frame img {
            width: 100%;
            border-radius: 12px;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
            
        }

        .photo-number {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(67, 48, 46, 0.7);
            color: var(--cream);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
        }

        .back-btn {
            display: block;
            margin: 0 auto;
            padding: 14px 40px;
            background: var(--old-burgundy);
            color: var(--cream);
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(67, 48, 46, 0.3);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .password-card {
                padding: 40px 25px;
                max-width: 320px;
            }

            .lovebook-title {
                font-size: 26px;
                letter-spacing: 2px;
                margin-bottom: 20px;
            }

            .hint-label {
                font-size: 12px;
            }

            .letter-container {
                padding: 40px 25px;
                max-width: 100%;
            }

            .letter-title {
                font-size: 22px;
            }

            .letter-content {
                font-size: 15px;
                line-height: 1.7;
            }

            .photobooth-title {
                font-size: 24px;
                margin-bottom: 30px;
            }

            .photos-grid {
                gap: 15px;
            }
        }

        @media (max-width: 480px) {
            .page-1, .page-2, .page-3 {
                padding: 20px 15px;
            }

            .password-card {
                padding: 35px 20px;
            }

            .divider-top, .divider-bottom {
                width: 80%;
            }

            .lovebook-title {
                font-size: 22px;
                letter-spacing: 1.5px;
            }

            .password-input {
                font-size: 14px;
                padding: 12px 15px;
            }

            .letter-container {
                padding: 30px 20px;
            }

            .letter-title {
                font-size: 18px;
            }

            .letter-content {
                font-size: 14px;
                line-height: 1.6;
            }

            .photobooth-title {
                font-size: 20px;
                margin-bottom: 25px;
            }

            .photo-frame {
                border-radius: 12px;
            }
        }

        /* Safe Area for notch devices */
        @supports (padding: max(0px)) {
            .page-1, .page-2, .page-3 {
                padding-top: max(20px, env(safe-area-inset-top));
                padding-bottom: max(20px, env(safe-area-inset-bottom));
                padding-left: max(15px, env(safe-area-inset-left));
                padding-right: max(15px, env(safe-area-inset-right));
            }
        }

        /* Loading State */
        .loading {
            opacity: 0.5;
            pointer-events: none;
        }
        
        .letter-content::-webkit-scrollbar {
            width: 6px;
        }

        .letter-content::-webkit-scrollbar-thumb {
            background: var(--soft-burgundy);
            border-radius: 10px;
        }
        
        .viewer {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.95);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;

    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
}

.viewer.active {
    opacity: 1;
    pointer-events: auto;
}

.viewer img {
    max-width: 95%;
    max-height: 90%;
    object-fit: contain;
    border-radius: 12px;
}

.viewer-close {
    position: absolute;
    top: 20px;
    right: 25px;
    font-size: 32px;
    color: white;
    cursor: pointer;
}
    </style>
</head>
<body>
    <!-- PAGE 1: PASSWORD -->
    <div class="page-container page-1 active" id="page1">
        <div class="stars-bg" id="starsContainer"></div>
        <div class="password-card">
            <div class="divider-top"></div>
            <h1 class="lovebook-title">lovebook</h1>
            <p class="hint-label">The password is kenneth lovey-dovey<br><span style="font-size: 12px; opacity: 0.8;">Enter the password to continue</span></p>
            <div class="password-input-wrapper">
<input 
    type="text" 
    id="passwordInput" 
    class="password-input" 
    placeholder="type it here..."
    autocomplete="off"
>
                <div class="error-message" id="errorMsg">❌ Incorrect password. Try again!</div>
            </div>
            <button class="submit-btn" id="submitBtn">Enter</button>
            <div class="divider-bottom"></div>
        </div>
    </div>

    <!-- PAGE 2: LOVE LETTER -->
    <div class="page-container page-2" id="page2">
        <div class="letter-container">
            <div class="letter-header">
                <h2 class="letter-title">For you, my dearest love</h2>
                <p class="letter-subtitle">Who feels like home</p>
            </div>
            <div class="letter-content" id="letterContent"></div>
            <div class="letter-signature">
                <div>With all my love, Delara.</div>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn next-btn" onclick="goToPage(3)">Next</button>
            </div>
        </div>
    </div>

    <!-- PAGE 3: PHOTOBOOTH -->
    <div class="page-container page-3" id="page3">
        <div class="photobooth-container">
            <h2 class="photobooth-title">Us Memories</h2>
            <div class="photos-grid" id="photosGrid"></div>
            <button class="back-btn" onclick="goToPage(1)">Back to Start</button>
        </div>
    </div>

    <!-- Audio Element -->
<audio id="bgAudio" loop preload="auto">
        <source src="seasons.mp3" type="audio/mpeg">
    </audio>
<div id="photoViewer" class="viewer">
    <span class="viewer-close">&times;</span>
    <img id="viewerImg" src="">
</div>
    <script>
        // ===== CONFIGURATION =====
        const PASSWORD = 'delara';
        
        // Love Letter Text
        const LOVE_LETTER = `haaaiii kakak sayaang, makasih banyak udah mau maafin sikap kekanak-kanakan aku kemarinn.. you always understand my feelings, always love me, always care about me, always asking if my days are going well or not, dan selalu ngabarin aku di saat kamu lagi sibuk banget. kakak, makasih banyak ya udah mau ngejalanin hubungan sama aku selama ini. i love you a lot, please don't let your love for me fade. thank you too for always remembering the little things about me, kakak ;( aku cayaang kamu sangaaat! makasih juga ya udah sayang sama aku teruss, and i hope our relationship will be even better in the future. i love you, i love you so much, kakak. <3`;

        let currentPage = 1;
        let audioPlaying = false;
        let audioInitialized = false;
        const audio = document.getElementById('bgAudio');

        // ===== GENERATE STARS =====
        function generateStars() {
            const container = document.getElementById('starsContainer');
            container.innerHTML = '';
            const starCount = Math.floor(window.innerWidth / 30) * Math.floor(window.innerHeight / 30);
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                star.setAttribute('class', 'star');
                star.setAttribute('viewBox', '0 0 24 24');
                star.setAttribute('fill', 'rgba(139, 90, 90, 0.5)');
                star.innerHTML = '<path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>';
                
                const randomX = Math.random() * 100;
                const randomY = Math.random() * 100;
                const randomSize = Math.random() * 15 + 12;
                
                star.style.left = randomX + '%';
                star.style.top = randomY + '%';
                star.style.width = randomSize + 'px';
                star.style.height = randomSize + 'px';
                
                container.appendChild(star);
            }
        }

function typewriter(element, text, speed = 30) {
    element.innerHTML = '';

    const paragraphs = text.trim().split(/\n\s*\n/);
    let paraIndex = 0;
    let charIndex = 0;

let currentP = document.createElement('div');
currentP.className = 'paragraph';
currentP.style.opacity = '1'; // ⬅️ INI FIX NYA
element.appendChild(currentP);

    function type() {
        if (paraIndex >= paragraphs.length) return;

        const currentText = paragraphs[paraIndex];

        if (charIndex < currentText.length) {
            // Tambahkan karakter satu per satu
            currentP.textContent += currentText[charIndex];
            charIndex++;

            setTimeout(() => type(), speed);
        } else {
            // Selesai paragraph, langsung bikin yang baru
            currentP.style.opacity = '1';
            paraIndex++;
            charIndex = 0;

            if (paraIndex < paragraphs.length) {
                setTimeout(() => {
    currentP = document.createElement('div');
    currentP.className = 'paragraph';
    currentP.style.opacity = '1'; // ⬅️ tambah ini juga
    element.appendChild(currentP);
    type();
}, 100);
            }
        }
    }

    type();
}

        // ===== AUDIO MANAGEMENT =====
function initAudio() {
    if (audioInitialized) return;

    audio.volume = 0.5;

    const playPromise = audio.play();

    if (playPromise !== undefined) {
        playPromise
            .then(() => {
                audioInitialized = true;
                audioPlaying = true;
            })
            .catch(() => {
                // retry saat user interaction berikutnya
                console.log('Retrying audio on next interaction...');
                audioInitialized = false;
            });
    }
}

        // ===== PAGE NAVIGATION =====
        function goToPage(pageNum) {
            if (pageNum === currentPage) return;
            
            document.getElementById('page' + currentPage).classList.remove('active');
            document.getElementById('page' + pageNum).classList.add('active');
            currentPage = pageNum;
            
            initAudio();
            
            if (pageNum === 2) {
                setTimeout(() => {
                    const letterContent = document.getElementById('letterContent');
                    letterContent.scrollTop = 0;
                    typewriter(letterContent, LOVE_LETTER, 25);
                }, 100);
            }
            
            if (pageNum === 3) {
                generatePhotosGrid();
            }
        }

        // ===== GENERATE PHOTOS GRID =====
        function generatePhotosGrid() {
            const grid = document.getElementById('photosGrid');
            grid.innerHTML = '';
            
const photos = [
    "na1.jpg",
    "na2.jpg",
    "na3.jpg",
    "na4.jpg",
    "na5.jpg",
    "na6.jpg"
];

photos.forEach((src, index) => {
    const frame = document.createElement('div');
    frame.className = 'photo-frame';

    const img = document.createElement('img');
    img.src = src;
    img.alt = `Memory ${index + 1}`;

    const number = document.createElement('div');
    number.className = 'photo-number';
    number.textContent = index + 1;

    frame.appendChild(img);
    frame.appendChild(number);
    grid.appendChild(frame);
});
        }

        // ===== PASSWORD VALIDATION =====
        function validatePassword() {
            const input = document.getElementById('passwordInput').value.toLowerCase();
            const errorMsg = document.getElementById('errorMsg');
            const submitBtn = document.getElementById('submitBtn');
            
            if (input === PASSWORD) {
                submitBtn.textContent = '✓ Success!';
                submitBtn.style.background = 'linear-gradient(135deg, #4CAF50, #45a049)';
                errorMsg.classList.remove('show');
                
                setTimeout(() => {
                    goToPage(2);
                    document.getElementById('passwordInput').value = '';
                    submitBtn.textContent = 'Enter';
                    submitBtn.style.background = 'linear-gradient(135deg, var(--old-burgundy), var(--soft-burgundy))';
                }, 600);
            } else {
                errorMsg.classList.add('show');
                document.getElementById('passwordInput').value = '';
                setTimeout(() => errorMsg.classList.remove('show'), 3000);
            }
        }

        // ===== EVENT LISTENERS =====
        document.getElementById('submitBtn').addEventListener('click', validatePassword);
        
        document.getElementById('passwordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                validatePassword();
            }
        });

        document.getElementById('passwordInput').addEventListener('focus', initAudio);

        // Generate stars on load
        window.addEventListener('DOMContentLoaded', () => {
            generateStars();
            generatePhotosGrid();
        });

        window.addEventListener('resize', () => {
            generateStars();
        });

        // Touch optimization for mobile
        document.addEventListener('touchstart', function() {
            initAudio();
        }, { once: true });
        
        // Fallback click 
document.addEventListener('click', () => {
    initAudio();
}, { once: true });

document.body.addEventListener('touchend', initAudio, { once: true });

        // Prevent long-press context menu
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            return false;
        });
        
        const viewer = document.getElementById('photoViewer');
const viewerImg = document.getElementById('viewerImg');
const viewerClose = document.querySelector('.viewer-close');

// open fullscreen
document.addEventListener('click', function(e) {
    if (e.target.tagName === 'IMG' && e.target.closest('.photo-frame')) {
        viewerImg.src = e.target.src;
        viewer.classList.add('active');
        document.body.style.overflow = 'hidden';
    }
});

// close fullscreen (tap anywhere)
viewer.addEventListener('click', () => {
    viewer.classList.remove('active');
    document.body.style.overflow = '';
});

// prevent close when clicking image itself (optional)
viewerImg.addEventListener('click', (e) => {
    e.stopPropagation();
});
    </script>
</body>
</html>
